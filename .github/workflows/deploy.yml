name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Docker build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload project files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/deploy_key -p ${VPS_PORT:-22}"

          # 不依赖 VPS 安装 rsync：远端只需要常见的 tar/sh。
          $SSH "$VPS_USER@$VPS_HOST" "export VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH'; bash -se" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$VPS_DEPLOY_PATH"
          cd "$VPS_DEPLOY_PATH"
          # 保留生产 .env、运行期 storage，以及用户可选的本地 compose override。
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.env' \
            ! -name 'storage' \
            ! -name 'docker-compose.override.yml' \
            -exec rm -rf {} +
          REMOTE

          tar -czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage/app/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/logs/*' \
            . | $SSH "$VPS_USER@$VPS_HOST" "tar -xzf - -C '$VPS_DEPLOY_PATH'"

      - name: Build and restart Docker services
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/deploy_key -p ${VPS_PORT:-22}"
          $SSH "$VPS_USER@$VPS_HOST" "export VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH'; bash -se" <<'REMOTE'
          set -euo pipefail
          cd "$VPS_DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "ERROR: $VPS_DEPLOY_PATH/.env 不存在，请先在 VPS 上创建并填写 .env"
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "ERROR: VPS 未安装 docker"
            exit 1
          fi

          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "ERROR: VPS 未安装 docker compose"
            exit 1
          fi

          mkdir -p \
            storage/app/public \
            storage/framework/cache \
            storage/framework/sessions \
            storage/framework/views \
            storage/logs \
            bootstrap/cache

          $DC stop scheduler >/dev/null 2>&1 || true
          $DC up -d --build --force-recreate --remove-orphans app nginx

          $DC exec -T app php artisan optimize:clear || true
          $DC exec -T app php artisan package:discover --ansi
          $DC exec -T app php artisan migrate --force
          $DC exec -T app php artisan storage:link || true
          $DC exec -T app php artisan config:cache
          $DC exec -T app php artisan route:clear
          $DC exec -T app php artisan view:cache
          $DC exec -T app chown -R www-data:www-data storage bootstrap/cache || true

          $DC up -d --force-recreate --remove-orphans scheduler
          $DC ps
          REMOTE
