x-zxsms-app: &zxsms-app
  build:
    context: .
    dockerfile: Dockerfile
  image: ${COMPOSE_PROJECT_NAME:-zxsms}-app:latest
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - ./.env:/var/www/html/.env:ro
    - ./storage:/var/www/html/storage
    - ./bootstrap/cache:/var/www/html/bootstrap/cache
    - ./public:/var/www/html/public
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    db:
      condition: service_healthy
  networks:
    - zxsms

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_this_root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-zxsms}
      MYSQL_USER: ${DB_USERNAME:-zxsms}
      MYSQL_PASSWORD: ${DB_PASSWORD:-zxsms_password}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - zxsms

  app:
    <<: *zxsms-app
    command: php-fpm

  scheduler:
    <<: *zxsms-app
    command: >
      sh -lc "while true; do
      php artisan schedule:run --verbose --no-interaction;
      sleep 60;
      done"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${SMS_DOCKER_HTTP_BIND:-127.0.0.1}:${SMS_DOCKER_HTTP_PORT:-18081}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - ./storage:/var/www/html/storage:ro
    networks:
      - zxsms

networks:
  zxsms:
    driver: bridge

volumes:
  mysql_data:
    driver: local
